paths:
  inbox: data/inbox
  outputs: data/outputs
  processed: data/processed
  logs: data/logs
  branding_dir: data/branding

processing:
  language: auto           # 'auto', 'ru', 'en', ...
  use_gpu: true            # true если есть NVIDIA (CUDA)
  device_index: 0
  whisper_model: medium    # tiny/base/small/medium/large-v3
  max_clips_per_episode: 10
  min_clip_len_sec: 15
  max_clip_len_sec: 58
  target_fps: 30
  target_height: 1920
  target_width: 1080
  audio_lufs: -14          # целевая громкость

selection:
  keywords:
    - финал
    - правда
    - секрет
    - убийца
    - любовь
    - что это
    - почему
    - не может быть
    - wow
    - no way
    - А
    - Ааа
    - Аааа
    - Ага
    - Ай
    - Ах
    - Ах ты
    - Боже
    - Боже мой
    - Боже правый
    - Блин
    - Вот черт
    - Вот это да
    - Господи
    - Да будь я проклят
    - Дурак
    - Есть
    - Жуть
    - Зашибись
    - Здорово
    - Идиот
    - Какого черта
    - Караул
    - Кошмар
    - Круто
    - Лопни мои глаза
    - Мда
    - Ммм
    - Надо же
    - Не может быть
    - Ничего себе
    - Ну и ну
    - Ну вот
    - О
    - Ой
    - Ой-ой-ой
    - Ого
    - Ох
    - Ох ты
    - Победа
    - Поделом
    - Помогите
    - Превосходно
    - Прикольно
    - Прости
    - С ума сойти
    - Спасайся
    - Стоп
    - Страшно
    - С ума сойти
    - Твою же
    - Твою мать
    - Точняк
    - Тьфу
    - Ты видел
    - Увы
    - Угу
    - Ужас
    - Ух ты
    - Ух
    - Фух
    - Ха-ха
    - Хм
    - Хнык
    - Чёрт
    - Чёрт возьми
    - Чёрт побери
    - Что
    - Чтооо
    - Что это
    - Э
    - Эй
    - Эк
    - Эх
    - Я в шоке
  keyword_weight: 2.0
  speech_rate_weight: 1.2
  volume_weight: 1.0       # используется как коэффициент (упрощённо)

branding:
  watermark: ""   # опционально
  watermark_pos: "10:10"                   # x:y от левого верхнего
  safe_area_pad: 60

youtube:
  default_privacy: public
  default_category_id: 24
  tags: [official, shorts, series, highlights]
  title_template: "{show} — {clip_title} | #{show_nospace} #Shorts"
  description_template: |
    Официальный клип из сериала «{show}» — {season_episode}.
    Смотреть полную серию на официальном канале.

    #Shorts #Клипы #Сериал

channels:
  series_to_channel:
    "default": "owner1"
  aliases:
    owner1:
      client_secret: auth/client_secret.json
      credentials: auth/owner1_credentials.json
      playlist_id: ""   # опционально

pro:
  enable_postprocess: true
  # keep | blur_bg | center_crop | letterbox
  vertical_mode: keep
  target_width: 1080
  target_height: 1920
  fps: 30

  # Аудио постпроцесс
  music_enabled: true
  music_dir: data/music
  music_volume: 0.25
  speech_normalize: true
  ducking: true
  speed_variation: true